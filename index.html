<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body
    class="bg-gradient-to-br from-gray-900 via-slate-800 to-black text-white"
  >
    <div class="flex flex-col justify-center items-center h-screen">
      <div
        class="border-1 border-white pt-[2rem] pb-[2rem] pr-[2rem] pl-[2rem] rounded-lg h-[700px] bg-white/5 backdrop-blur-md border border-white/20 rounded-lg p-8"
      >
        <div class="text-center mb-3.5">
          <div id="clock" class="text-amber-300 text-2xl mb-1">Date:</div>
          <div id="time" class="text-pink-300 text-2xl mb-1">Time:</div>
        </div>

        <div
          id="schedule"
          class="text-center bg-white/5 rounded-lg p-6 space-y-2 mb-2.5 mt-1"
        >
          <h1 class="font-bold text-3xl text-blue-400 mb-4">Schedule</h1>

          <div class="time-slot text-blue-300 hover:text-amber-300 transition">
            05:00-06:00 am college
          </div>
          <div class="time-slot text-blue-300 hover:text-amber-300 transition">
            06:00-08:00 am studies
          </div>
          <div class="time-slot text-blue-300 hover:text-amber-300 transition">
            08:00-01:00 pm breakfast
          </div>
          <div class="time-slot text-blue-300 hover:text-amber-300 transition">
            01:00-02:00 pm prayer & lunch
          </div>
          <div class="time-slot text-blue-300 hover:text-amber-300 transition">
            02:00-07:00 pm Skill Development
          </div>
          <div class="time-slot text-blue-300 hover:text-amber-300 transition">
            07:00-10:00 pm work-free-isha prayer & sleep
          </div>
        </div>

        <div class="text-center bg-white/5 rounded-lg p-6 space-y-3">
          <h1 class="font-bold text-2xl text-pink-400 mb-2">My Todo List</h1>
          <input
            type="text"
            id="input"
            placeholder="Add a new task"
            class="flex-1 p-2 rounded-md text-black placeholder-gray-500 focus:ring-2 focus:ring-amber-300 focus:outline-none pl-1"
          />
          <button
            id="add"
            class="bg-amber-300 text-black font-bold px-4 rounded-md hover:bg-amber-400 transition"
          >
            + Add
          </button>
          <ul id="todo-list" class="text-gray-200 space-y-1"></ul>

          <div class="flex justify-center mt-4">
            <img
              id="delete"
              src="delete.png"
              class="w-8 h-8 cursor-pointer transition-transform hover:scale-110"
              alt="Delete Task"
            />
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
